server {
    listen 80;

    # ── SPA React ─────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── API FastAPI ───────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;   # suficiente para YOLO + Telegram
    }

    # ── Imágenes procesadas ───────────────────────────────────
    location /media {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 10m;   # cachear imágenes 10 min en nginx
    }
}